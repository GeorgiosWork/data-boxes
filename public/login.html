<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin přihlášení | Datové schránky</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f0f4f9; color: #222;
      min-height: 100vh; display: flex;
      align-items: center; justify-content: center; padding: 24px;
    }

    .card {
      background: #fff; border-radius: 18px;
      box-shadow: 0 6px 32px rgba(0,0,0,0.10);
      padding: 48px 40px 40px;
      width: 100%; max-width: 400px; text-align: center;
    }

    .logo {
      width: 60px; height: 60px;
      background: linear-gradient(135deg, #1a56db, #0e3fa8);
      border-radius: 16px; display: inline-flex;
      align-items: center; justify-content: center;
      margin-bottom: 22px; box-shadow: 0 4px 12px rgba(26,86,219,0.28);
    }
    .logo svg { width: 30px; height: 30px; fill: #fff; }

    h1 { font-size: 22px; font-weight: 700; color: #111; margin-bottom: 6px; }
    .subtitle { font-size: 14px; color: #666; margin-bottom: 28px; }

    .field { margin-bottom: 16px; text-align: left; }
    .field label { display: block; font-size: 13px; font-weight: 600; color: #444; margin-bottom: 6px; }
    .field input {
      width: 100%; padding: 12px 14px;
      border: 1.5px solid #d8dde6; border-radius: 10px; font-size: 15px;
      background: #fafbfc; transition: border-color 0.2s, box-shadow 0.2s;
    }
    .field input:focus {
      outline: none; border-color: #1a56db;
      box-shadow: 0 0 0 3px rgba(26,86,219,0.12); background: #fff;
    }

    .err-banner {
      background: #fff0f0; color: #c53030; border: 1px solid #fecaca;
      border-radius: 8px; padding: 10px 14px; font-size: 13px;
      margin-bottom: 16px; display: none; text-align: left;
    }
    .err-banner.visible { display: block; }

    .btn {
      width: 100%; padding: 13px;
      background: linear-gradient(135deg, #1a56db, #0e3fa8);
      color: #fff; border: none; border-radius: 10px;
      font-size: 15px; font-weight: 600; cursor: pointer;
      transition: opacity 0.2s, transform 0.1s; margin-top: 6px;
    }
    .btn:hover { background: #fff; color: #1a56db; border: 1px solid #1a56db; opacity: 1; }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.55; cursor: not-allowed; }

    @media (max-width: 480px) { .card { padding: 36px 22px 28px; } }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <!-- ikona zámku -->
      <svg viewBox="0 0 24 24">
        <path d="M18 8h-1V6A5 5 0 0 0 7 6v2H6a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V10a2 2 0 0 0-2-2zm-6 9a2 2 0 1 1 0-4 2 2 0 0 1 0 4zm3.1-9H8.9V6a3.1 3.1 0 0 1 6.2 0v2z"/>
      </svg>
    </div>
    <h1>Admin přihlášení</h1>
    <p class="subtitle">Datové schránky — správa souborů</p>

    <div class="err-banner" id="errBanner"></div>

    <div class="field">
      <label for="username">Uživatelské jméno</label>
      <input id="username" type="text" autocomplete="username" spellcheck="false" />
    </div>
    <div class="field">
      <label for="password">Heslo</label>
      <input id="password" type="password" autocomplete="current-password" />
    </div>

    <button class="btn" id="loginBtn">Přihlásit se</button>
  </div>

  <script>
    const $ = id => document.getElementById(id);

    $("loginBtn").addEventListener("click", doLogin);
    [$("username"), $("password")].forEach(el =>
      el.addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); })
    );

    async function doLogin() {
      const username = $("username").value.trim();
      const password = $("password").value;

      if (!username || !password) {
        showError("Vyplňte uživatelské jméno i heslo.");
        return;
      }

      $("loginBtn").disabled = true;
      $("loginBtn").textContent = "Přihlašuji…";

      try {
        const res  = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json().catch(() => ({}));

        if (res.ok && data.success) {
          setTimeout(() => { window.location.href = "/admin.html"; }, 300);
        } else {
          showError(data.message || "Neplatné přihlašovací údaje.");
        }
      } catch {
        showError("Nepodařilo se spojit se serverem.");
      } finally {
        $("loginBtn").disabled = false;
        $("loginBtn").textContent = "Přihlásit se";
        $("password").value = "";
      }
    }

    function showError(msg) {
      const el = $("errBanner");
      el.textContent = msg;
      el.classList.add("visible");
    }
  </script>
</body>
</html>
