name = "data-boxes-app"
compatibility_date = "2026-04-05"
pages_build_output_dir = "public"

[[r2_buckets]]
binding = "R2"
bucket_name = "data-boxes-bucket"

[[kv_namespaces]]
binding = "USER_DATA_BOXES_SID"
id = "c498c80b8f154ec583ca902139e34733"

[[kv_namespaces]]
binding = "ADMIN_DATA_BOXES_SID"
id = "6ee872da307a487ca87132f9403d911d"

# Environment variables — nastavit v Cloudflare dashboard:
# Settings → Environment variables → Production
#
# ADMIN_TOKEN   — interní secret (rezerva pro server-to-server volání, prohlížeč ho nepoužívá)
# VALID_USER_1  — uživatelské jméno admina
# VALID_PASS_1  — heslo admina
# VALID_USER_2  — (volitelné) druhý admin
# VALID_PASS_2  — (volitelné) heslo druhého admina
